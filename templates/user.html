<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ad Manager — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div class="max-w-6xl mx-auto p-5">
      <header class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-3xl font-bold m-0">Ad Manager</h1>
          <div class="text-gray-500 text-sm">
            Manage and monitor your advertisement campaigns
          </div>
        </div>
        <button
          class="bg-blue-600 text-white px-4 py-2 rounded font-semibold text-sm hover:bg-blue-700"
          onclick="openAddAdModal()"
        >
          + New Ad
        </button>
      </header>

      <!-- METRICS ROW -->
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
          <div class="text-center">
            <div class="text-2xl font-bold text-blue-600" id="total-ads">0</div>
            <div class="text-xs text-gray-500 mt-1">Total Ads</div>
          </div>
        </div>
        <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
          <div class="text-center">
            <div class="text-2xl font-bold text-blue-600" id="active-ads">
              0
            </div>
            <div class="text-xs text-gray-500 mt-1">Active</div>
          </div>
        </div>
        <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
          <div class="text-center">
            <div
              class="text-2xl font-bold text-blue-600"
              id="total-impressions"
            >
              0
            </div>
            <div class="text-xs text-gray-500 mt-1">Impressions</div>
          </div>
        </div>
        <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
          <div class="text-center">
            <div class="text-2xl font-bold text-blue-600" id="total-clicks">
              0
            </div>
            <div class="text-xs text-gray-500 mt-1">Clicks</div>
          </div>
        </div>
      </div>

      <!-- ADS TABLE -->
      <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
        <h3 class="m-0 mb-3 text-lg font-semibold">Advertisement Campaigns</h3>
        <div id="ads-container">
          <div class="text-center py-6 text-gray-500">
            <div class="text-4xl mb-2">📢</div>
            <div>No advertisements yet. Create one to get started.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ADD/EDIT AD MODAL -->
    <div
      id="adModal"
      class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50"
    >
      <div
        class="bg-white rounded-lg p-6 max-w-md w-11/12 max-h-[90vh] overflow-y-auto"
      >
        <div class="flex justify-between items-center mb-4">
          <h2 id="modal-title" class="m-0 text-xl font-semibold">
            New Advertisement
          </h2>
          <button
            class="bg-none border-none text-2xl cursor-pointer text-gray-500 hover:text-gray-700"
            onclick="closeAddAdModal()"
          >
            ×
          </button>
        </div>

        <div class="mb-3">
          <label for="ad-name" class="block mt-2 text-sm font-medium"
            >Campaign Name</label
          >
          <input
            type="text"
            id="ad-name"
            placeholder="e.g., Summer Promo 2026"
            class="w-full box-border font-inherit text-sm px-2 py-2 rounded border border-gray-300 mt-1"
          />
        </div>

        <div class="mb-3">
          <label for="ad-title" class="block mt-2 text-sm font-medium"
            >Ad Title</label
          >
          <input
            type="text"
            id="ad-title"
            placeholder="e.g., Get 50% Off This Season"
            class="w-full box-border font-inherit text-sm px-2 py-2 rounded border border-gray-300 mt-1"
          />
        </div>

        <div class="mb-3">
          <label for="ad-description" class="block mt-2 text-sm font-medium"
            >Description</label
          >
          <textarea
            id="ad-description"
            rows="4"
            placeholder="Ad description or content..."
            class="w-full box-border font-mono text-sm px-2 py-2 rounded border border-gray-300 mt-1"
          ></textarea>
        </div>

        <div class="mb-3">
          <label for="ad-impression-cap" class="block mt-2 text-sm font-medium"
            >Impression Cap</label
          >
          <input
            type="number"
            id="ad-impression-cap"
            placeholder="e.g., 10000"
            class="w-full box-border font-inherit text-sm px-2 py-2 rounded border border-gray-300 mt-1"
          />
        </div>

        <div class="mb-3">
          <label for="ad-target" class="block mt-2 text-sm font-medium"
            >Target Audience</label
          >
          <input
            type="text"
            id="ad-target"
            placeholder="e.g., Users aged 18-35"
            class="w-full box-border font-inherit text-sm px-2 py-2 rounded border border-gray-300 mt-1"
          />
        </div>

        <div class="mb-3">
          <label for="ad-budget" class="block mt-2 text-sm font-medium"
            >Budget ($)</label
          >
          <input
            type="number"
            id="ad-budget"
            placeholder="1000"
            min="0"
            step="100"
            class="w-full box-border font-inherit text-sm px-2 py-2 rounded border border-gray-300 mt-1"
          />
        </div>

        <div class="mb-3">
          <label for="ad-start-date" class="block mt-2 text-sm font-medium"
            >Start Date</label
          >
          <input
            type="date"
            id="ad-start-date"
            class="w-full box-border font-inherit text-sm px-2 py-2 rounded border border-gray-300 mt-1"
          />
        </div>

        <div class="mb-3">
          <label for="ad-end-date" class="block mt-2 text-sm font-medium"
            >End Date</label
          >
          <input
            type="date"
            id="ad-end-date"
            class="w-full box-border font-inherit text-sm px-2 py-2 rounded border border-gray-300 mt-1"
          />
        </div>

        <div class="mb-3">
          <label class="block mt-2 text-sm font-medium">Flights & Fleets</label>
          <div
            class="border border-gray-300 rounded p-2 max-h-40 overflow-y-auto bg-gray-50"
            id="flights-selector"
          ></div>
          <div class="text-xs text-gray-500 mt-1">
            Select one or more flights or entire fleets
          </div>
        </div>

        <div class="mb-3">
          <label for="ad-status" class="block mt-2 text-sm font-medium"
            >Status</label
          >
          <select
            id="ad-status"
            class="w-full box-border font-inherit text-sm px-2 py-2 rounded border border-gray-300 mt-1"
          >
            <option value="draft">Draft</option>
            <option value="active">Active</option>
            <option value="paused">Paused</option>
          </select>
        </div>

        <div class="flex gap-2 mt-5">
          <button
            class="bg-blue-600 text-white px-3 py-2 rounded font-semibold text-sm hover:bg-blue-700"
            onclick="saveAd()"
          >
            Save Ad
          </button>
          <button
            class="bg-gray-900 text-white px-3 py-2 rounded font-semibold text-sm hover:bg-gray-700"
            onclick="closeAddAdModal()"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/adManager.js') }}"></script>
  </body>
</html>
